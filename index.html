<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julian Whiteley | Mechanical Engineering</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text: #050505;
            --muted: #8a8a8a;
            --line: #dcdcdc;
            --accent: #bf5700;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            background: var(--bg);
            color: var(--text);
        }

        body {
            overflow-x: hidden;
        }

        nav {
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 28px 48px;
            background: rgba(255, 255, 255, 0.94);
        }

        .nav-logo {
            color: var(--text);
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 0.14em;
            text-decoration: none;
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            gap: 28px;
        }

        .nav-links a {
            color: var(--muted);
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 0.16em;
            text-decoration: none;
            text-transform: uppercase;
            transition: color 0.2s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--text);
        }

        main {
            min-height: calc(100vh - 84px);
            display: flex;
            align-items: center;
            padding: 64px 48px 96px;
        }

        .content {
            width: min(1120px, 100%);
            margin: 0 auto;
        }

        .eyebrow {
            display: block;
            margin-bottom: 26px;
            color: var(--muted);
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        h1 {
            max-width: 980px;
            margin: 0;
            color: var(--text);
            font-size: 7.5rem;
            font-weight: 500;
            line-height: 0.92;
        }

        .menu-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 34px;
            margin-top: 74px;
        }

        .menu-box {
            color: var(--text);
            font-size: 1rem;
            font-weight: 500;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .menu-box::after {
            content: "";
            display: block;
            width: 100%;
            height: 1px;
            margin-top: 10px;
            background: var(--line);
            transition: background 0.2s ease;
        }

        .menu-box:hover::after {
            background: var(--text);
        }

        .menu-box.primary::after {
            background: var(--accent);
        }

        .menu-box strong {
            font: inherit;
        }

        @media (max-width: 760px) {
            nav {
                align-items: flex-start;
                flex-direction: column;
                gap: 18px;
                padding: 24px;
            }

            .nav-links {
                flex-wrap: wrap;
                gap: 18px;
            }

            main {
                min-height: auto;
                padding: 96px 24px 72px;
            }

            h1 {
                font-size: 4rem;
                line-height: 0.98;
            }

            .menu-grid {
                gap: 24px;
                margin-top: 56px;
            }
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="nav-logo">MJW</a>
    <div class="nav-links">
        <a href="index.html" class="active">Home</a>
        <a href="about.html">About</a>
        <a href="projects.html">Projects</a>
        <a href="resume.html">Resume</a>
        <a href="contact.html">Contact</a>
    </div>
</nav>

<main>
    <section class="content">
        <span class="eyebrow">UT Austin &middot; MechE Honors</span>
        <h1>Julian Whiteley</h1>

        <div class="menu-grid">
            <a href="about.html" class="menu-box"><strong>About</strong></a>
            <a href="projects.html" class="menu-box primary"><strong>Projects</strong></a>
            <a href="resume.html" class="menu-box"><strong>Resume</strong></a>
            <a href="contact.html" class="menu-box"><strong>Contact</strong></a>
        </div>
    </section>
</main>

</body>
</html>
