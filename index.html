<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julian Whiteley | Mechanical Engineering</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --border: #eaeaea; --text: #1a1a1a; --ut-orange: #bf5700; }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: #fcfcfc;
            overflow-x: hidden;
            color: var(--text);
        }

        #smoke-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        nav {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-logo {
            font-weight: 800;
            font-size: 1.2rem;
            text-decoration: none;
            color: var(--text);
        }

        .nav-links a {
            text-decoration: none;
            color: #666;
            font-weight: 600;
            margin-left: 25px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: color 0.2s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #000;
        }

        .content {
            position: relative;
            z-index: 5;
            min-height: calc(100vh - 82px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px 48px;
        }

        .eyebrow {
            display: block;
            margin-bottom: 14px;
            color: #bbb;
            font-size: 0.72rem;
            font-weight: 800;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            color: var(--text);
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            line-height: 1.05;
        }

        .menu-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 36px;
        }

        .menu-box {
            min-width: 116px;
            background: #fff;
            border: 1px solid var(--border);
            padding: 14px 18px;
            border-radius: 8px;
            text-decoration: none;
            transition: border-color 0.25s ease, color 0.25s ease, transform 0.25s ease;
        }

        .menu-box:hover {
            border-color: var(--ut-orange);
            transform: translateY(-2px);
        }

        .menu-box strong {
            display: block;
            color: var(--text);
            font-size: 0.9rem;
            transition: color 0.25s;
        }

        .menu-box:hover strong {
            color: var(--ut-orange);
        }

        @media (max-width: 560px) {
            nav {
                padding: 18px 20px;
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .nav-links a {
                margin-left: 0;
                margin-right: 18px;
            }

            h1 {
                font-size: 2.4rem;
            }

            .menu-grid {
                width: 100%;
                display: grid;
                grid-template-columns: 1fr 1fr;
            }

            .menu-box {
                min-width: 0;
            }
        }
    </style>
</head>
<body>

<canvas id="smoke-canvas"></canvas>

<nav>
    <a href="index.html" class="nav-logo">MJW</a>
    <div class="nav-links">
        <a href="index.html" class="active">Home</a>
        <a href="about.html">About</a>
        <a href="projects.html">Projects</a>
        <a href="resume.html">Resume</a>
        <a href="contact.html">Contact</a>
    </div>
</nav>

<main class="content">
    <span class="eyebrow">UT Austin &middot; MechE Honors</span>
    <h1>Julian Whiteley</h1>

    <div class="menu-grid">
        <a href="about.html" class="menu-box"><strong>About</strong></a>
        <a href="projects.html" class="menu-box"><strong>Projects</strong></a>
        <a href="resume.html" class="menu-box"><strong>Resume</strong></a>
        <a href="contact.html" class="menu-box"><strong>Contact</strong></a>
    </div>
</main>

<script>
    const canvas = document.getElementById('smoke-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();
    class Particle {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.size = Math.random() * 5 + 2;
            this.speedX = (Math.random() - 0.5) * 0.8;
            this.speedY = (Math.random() - 0.5) * 0.8;
            this.color = 'rgba(0, 0, 0,';
            this.alpha = 0.2;
            this.decay = Math.random() * 0.015 + 0.01;
        }
        update() { this.x += this.speedX; this.y += this.speedY; if (this.size > 0.2) this.size -= 0.05; this.alpha -= this.decay; }
        draw() { ctx.fillStyle = this.color + this.alpha + ')'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
    }
    window.addEventListener('mousemove', (e) => { particles.push(new Particle(e.clientX, e.clientY)); });
    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < particles.length; i++) {
            particles[i].update(); particles[i].draw();
            if (particles[i].alpha <= 0) { particles.splice(i, 1); i--; }
        }
        requestAnimationFrame(animate);
    }
    animate();
</script>

</body>
</html>
