<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | Julian Whiteley</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --border: #eaeaea; --text: #1a1a1a; --muted: #666; --ut-orange: #bf5700; }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #fcfcfc;
            color: var(--text);
            overflow-x: hidden;
        }

        #smoke-canvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }

        nav {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-logo { font-weight: 800; font-size: 1.2rem; text-decoration: none; color: var(--text); }
        .nav-links a { text-decoration: none; color: #666; font-weight: 600; margin-left: 25px; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; }

        .container {
            max-width: 980px;
            margin: 90px auto;
            padding: 0 24px;
            position: relative;
            z-index: 5;
        }

        .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #bbb;
            font-weight: 800;
            margin-bottom: 12px;
            display: block;
        }

        .hero {
            display: grid;
            grid-template-columns: 1.25fr 0.75fr;
            gap: 44px;
            align-items: start;
            margin-bottom: 58px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            margin: 0 0 24px;
            line-height: 1.05;
            color: var(--text);
        }

        section { margin-bottom: 56px; }

        p {
            font-size: 1.03rem;
            line-height: 1.7;
            color: #444;
            margin: 0 0 16px;
        }

        .portrait-card {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px;
        }

        .portrait-card img {
            display: block;
            width: 100%;
            aspect-ratio: 4 / 5;
            object-fit: cover;
            border-radius: 6px;
            background: #f5f5f5;
        }

            margin: 12px 2px 0;
            font-size: 0.72rem;
            font-weight: 800;
