<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume | Julian Whiteley</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text: #050505;
            --muted: #8a8a8a;
            --line: #dcdcdc;
            --accent: #bf5700;
        }

        * { box-sizing: border-box; }

        html,
        body {
            margin: 0;
            min-height: 100%;
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            background: var(--bg);
            color: var(--text);
        }

        nav {
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 28px 48px;
            background: rgba(255, 255, 255, 0.94);
        }

        .nav-logo,
        .nav-links a,
        .label,
        .download-link {
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.16em;
        }

        .nav-logo {
            color: var(--text);
            font-size: 0.78rem;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 28px;
        }

        .nav-links a {
            color: var(--muted);
            font-size: 0.72rem;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--text);
        }

        main {
            width: min(1100px, calc(100% - 96px));
            margin: 0 auto;
            padding: 92px 0 120px;
        }

        .header {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 48px;
            align-items: end;
            margin-bottom: 56px;
        }

        .label {
            display: block;
            margin-bottom: 24px;
            color: var(--muted);
            font-size: 0.72rem;
        }

        h1 {
            margin: 0;
            font-size: clamp(3rem, 7vw, 5rem);
            font-weight: 500;
            letter-spacing: -0.07em;
            line-height: 0.9;
        }

        .download-link {
            color: var(--accent);
            font-size: 0.68rem;
            text-decoration: none;
        }

        .download-link::after {
            content: "";
            display: block;
            width: 100%;
            height: 1px;
            margin-top: 10px;
            background: var(--accent);
        }

        .fallback {
            margin: 24px 0 0;
            color: var(--muted);
            font-size: 1rem;
            line-height: 1.8;
        }

        .fallback a {
            color: var(--text);
            text-decoration: underline;
            text-underline-offset: 4px;
        }

        .resume-viewer {
            width: 100%;
            height: 82vh;
            min-height: 620px;
            border: 1px solid var(--line);
        }

        iframe {
            display: block;
            width: 100%;
            height: 100%;
            border: 0;
        }

        @media (max-width: 760px) {
            nav {
                align-items: flex-start;
                flex-direction: column;
                gap: 18px;
                padding: 24px;
            }

            .nav-links {
                flex-wrap: wrap;
                gap: 18px;
            }

            main {
                width: calc(100% - 48px);
                padding: 76px 0 88px;
            }

            .header {
                grid-template-columns: 1fr;
                gap: 32px;
            }

            .resume-viewer {
                min-height: 520px;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="nav-logo">MJW</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="projects.html">Projects</a>
            <a href="resume.html" class="active">Resume</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <main>
        <section class="header">
            <div>
                <span class="label">Julian Whiteley</span>
                <h1>Resume</h1>
                <p class="fallback">Preview not loading? <a href="https://docs.google.com/document/d/17PmqW3bWh0yHhcJy_bkhuZpTg7y4KTYsAd66SAEX-3Y/export?format=pdf">Open the PDF directly.</a></p>
            </div>
            <a class="download-link" href="https://docs.google.com/document/d/17PmqW3bWh0yHhcJy_bkhuZpTg7y4KTYsAd66SAEX-3Y/export?format=pdf">Download PDF</a>
        </section>

        <div class="resume-viewer">
            <iframe src="https://docs.google.com/document/d/17PmqW3bWh0yHhcJy_bkhuZpTg7y4KTYsAd66SAEX-3Y/preview" title="Julian Whiteley resume"></iframe>
        </div>
    </main>
</body>
</html>
