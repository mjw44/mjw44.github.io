<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume | Julian Whiteley</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --border: #eaeaea; --text: #1a1a1a; --ut-orange: #bf5700; }

        body, html {
            margin: 0; padding: 0;
            width: 100%;
            font-family: 'Inter', sans-serif;
            background-color: #fcfcfc;
            overflow-x: hidden;
            color: var(--text);
        }

        #smoke-canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: 1;
            pointer-events: none;
        }

        nav {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-logo { font-weight: 800; font-size: 1.2rem; text-decoration: none; color: var(--text); }
        .nav-links a {
            text-decoration: none;
            color: #666;
            font-weight: 600;
            margin-left: 25px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .resume-container {
            position: relative;
            z-index: 5;
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .header-area {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .header-left { text-align: left; }

        .eyebrow {
            font-size: 0.72rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            color: #bbb;
            display: block;
            margin-bottom: 6px;
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.04em;
            line-height: 1.05;
        }

        .fallback {
            font-size: 0.78rem;
            color: #bbb;
            margin-top: 8px;
        }

        .fallback a {
            color: var(--ut-orange);
            text-decoration: none;
            font-weight: 600;
        }

        .cta-button {
            display: inline-block;
            padding: 11px 22px;
            background: var(--ut-orange);
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            transition: opacity 0.2s;
            white-space: nowrap;
        }

        .cta-button:hover { opacity: 0.85; }

        .resume-viewer {
            width: 100%;
            height: 82vh;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

<canvas id="smoke-canvas"></canvas>

<nav>
    <a href="index.html" class="nav-logo">MJW</a>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="projects.html">Projects</a>
        <a href="resume.html" style="color: black;">Resume</a>
        <a href="contact.html">Contact</a>
    </div>
</nav>

<div class="resume-container">
    <div class="header-area">
        <div class="header-left">
            <span class="eyebrow">Julian Whiteley</span>
            <h1>Resume</h1>
            <p class="fallback">Preview not loading? <a href="https://docs.google.com/document/d/17PmqW3bWh0yHhcJy_bkhuZpTg7y4KTYsAd66SAEX-3Y/export?format=pdf">Download the PDF directly.</a></p>
        </div>
        <a href="https://docs.google.com/document/d/17PmqW3bWh0yHhcJy_bkhuZpTg7y4KTYsAd66SAEX-3Y/export?format=pdf" class="cta-button">Download PDF</a>
    </div>

    <div class="resume-viewer">
        <iframe src="https://docs.google.com/document/d/17PmqW3bWh0yHhcJy_bkhuZpTg7y4KTYsAd66SAEX-3Y/preview"></iframe>
    </div>
</div>

<script>
    const canvas = document.getElementById('smoke-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();
    class Particle {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.size = Math.random() * 5 + 2;
            this.speedX = (Math.random() - 0.5) * 0.8;
            this.speedY = (Math.random() - 0.5) * 0.8;
            this.color = 'rgba(0, 0, 0,';
            this.alpha = 0.2;
            this.decay = Math.random() * 0.015 + 0.01;
        }
        update() { this.x += this.speedX; this.y += this.speedY; if (this.size > 0.2) this.size -= 0.05; this.alpha -= this.decay; }
        draw() { ctx.fillStyle = this.color + this.alpha + ')'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
    }
    window.addEventListener('mousemove', (e) => { particles.push(new Particle(e.clientX, e.clientY)); });
    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < particles.length; i++) {
            particles[i].update(); particles[i].draw();
            if (particles[i].alpha <= 0) { particles.splice(i, 1); i--; }
        }
        requestAnimationFrame(animate);
    }
    animate();
</script>

</body>
</html>
