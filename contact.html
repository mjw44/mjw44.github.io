<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Julian Whiteley</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text: #050505;
            --muted: #8a8a8a;
            --line: #dcdcdc;
            --accent: #bf5700;
        }

        * { box-sizing: border-box; }

        html,
        body {
            margin: 0;
            min-height: 100%;
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            background: var(--bg);
            color: var(--text);
        }

        nav {
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 28px 48px;
            background: rgba(255, 255, 255, 0.94);
        }

        .nav-logo,
        .nav-links a,
        .label,
        .contact-label {
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.16em;
        }

        .nav-logo {
            color: var(--text);
            font-size: 0.78rem;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 28px;
        }

        .nav-links a {
            color: var(--muted);
            font-size: 0.72rem;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--text);
        }

        main {
            width: min(980px, calc(100% - 96px));
            margin: 0 auto;
            padding: 92px 0 120px;
        }

        .label {
            display: block;
            margin-bottom: 24px;
            color: var(--muted);
            font-size: 0.72rem;
        }

        h1 {
            max-width: 820px;
            margin: 0;
            font-size: clamp(3rem, 7vw, 5rem);
            font-weight: 500;
            letter-spacing: -0.07em;
            line-height: 0.9;
        }

        .intro {
            max-width: 520px;
            margin: 48px 0 92px;
            color: var(--muted);
            font-size: 1rem;
            line-height: 1.8;
        }

        .contact-list {
            display: grid;
            gap: 0;
            border-top: 1px solid var(--line);
        }

        .contact-item {
            display: grid;
            grid-template-columns: 220px minmax(0, 1fr);
            gap: 34px;
            padding: 30px 0;
            border-bottom: 1px solid var(--line);
        }

        .contact-label {
            color: var(--muted);
            font-size: 0.68rem;
        }

        .contact-link {
            color: var(--text);
            font-size: clamp(1.15rem, 2.5vw, 2rem);
            font-weight: 500;
            letter-spacing: -0.04em;
            line-height: 1;
            text-decoration: none;
            overflow-wrap: anywhere;
            transition: color 0.2s ease;
        }

        .contact-link:hover {
            color: var(--accent);
        }

        @media (max-width: 760px) {
            nav {
                align-items: flex-start;
                flex-direction: column;
                gap: 18px;
                padding: 24px;
            }

            .nav-links {
                flex-wrap: wrap;
                gap: 18px;
            }

            main {
                width: calc(100% - 48px);
                padding: 76px 0 88px;
            }

            .intro {
                margin-bottom: 72px;
            }

            .contact-item {
                grid-template-columns: 1fr;
                gap: 14px;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="nav-logo">MJW</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="projects.html">Projects</a>
            <a href="resume.html">Resume</a>
            <a href="contact.html" class="active">Contact</a>
        </div>
    </nav>

    <main>
        <span class="label">Contact</span>
        <h1>Let&rsquo;s build something.</h1>
        <p class="intro">Open to research opportunities, collaboration, internships, and good conversations.</p>

        <section class="contact-list" aria-label="Contact links">
            <div class="contact-item">
                <span class="contact-label">LinkedIn</span>
                <a href="https://www.linkedin.com/in/mjwhiteleyutexas/" target="_blank" class="contact-link">mjwhiteleyutexas</a>
            </div>
            <div class="contact-item">
                <span class="contact-label">Personal Email</span>
                <a href="mailto:mjd.whiteley@gmail.com" class="contact-link">mjd.whiteley@gmail.com</a>
            </div>
            <div class="contact-item">
                <span class="contact-label">UT Email</span>
                <a href="mailto:mj.whiteley@utexas.edu" class="contact-link">mj.whiteley@utexas.edu</a>
            </div>
        </section>
    </main>
</body>
</html>
