<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Julian Whiteley</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --border: #eaeaea; --text: #1a1a1a; --ut-orange: #bf5700; }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            font-family: 'Inter', sans-serif;
            background-color: #fcfcfc;
            color: var(--text);
            overflow-x: hidden;
        }

        #smoke-canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: 1;
            pointer-events: none;
        }

        nav {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border-bottom: 1px solid var(--border);
            position: relative;
            z-index: 100;
        }

        .nav-logo { font-weight: 800; font-size: 1.2rem; text-decoration: none; color: var(--text); }
        .nav-links a {
            text-decoration: none;
            color: #666;
            font-weight: 600;
            margin-left: 25px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: color 0.2s;
        }
        .nav-links a:hover { color: #000; }

        .contact-container {
            position: relative;
            z-index: 5;
            max-width: 500px;
            margin: 10vh auto;
            text-align: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            margin-bottom: 10px;
            color: var(--text);
        }

        .chill-text {
            font-size: 1rem;
            color: #666;
            margin-bottom: 40px;
            font-weight: 500;
        }

        .contact-card {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            text-align: left;
        }

        .contact-item { margin: 0; }

        .contact-link {
            display: block;
            color: var(--text);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 700;
            margin-top: 4px;
            transition: color 0.2s, transform 0.2s;
        }
        .contact-link:hover {
            color: var(--ut-orange);
            transform: translateX(3px);
        }

        .label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #bbb;
            display: block;
            font-weight: 800;
        }

        hr {
            border: 0;
            height: 1px;
            background: #eee;
            margin: 20px 0;
        }
    </style>
</head>
<body>

<canvas id="smoke-canvas"></canvas>

<nav>
    <a href="index.html" class="nav-logo">MJW</a>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="projects.html">Projects</a>
        <a href="resume.html">Resume</a>
        <a href="contact.html" style="color: black;">Contact</a>
    </div>
</nav>

<div class="contact-container">
    <h1>Get in touch.</h1>
    <p class="chill-text">Open to research opportunities, collaboration, and good conversations.</p>

    <div class="contact-card">

        <div class="contact-item">
            <span class="label">LinkedIn</span>
            <a href="https://www.linkedin.com/in/mjwhiteleyutexas/" target="_blank" class="contact-link">mjwhiteleyutexas</a>
        </div>

        <hr>

        <div class="contact-item">
            <span class="label">Personal Email</span>
            <a href="mailto:mjd.whiteley@gmail.com" class="contact-link">mjd.whiteley@gmail.com</a>
        </div>

        <hr>

        <div class="contact-item">
            <span class="label">Institutional Email</span>
            <a href="mailto:mj.whiteley@utexas.edu" class="contact-link">mj.whiteley@utexas.edu</a>
        </div>

    </div>
</div>

<script>
    const canvas = document.getElementById('smoke-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();
    class Particle {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.size = Math.random() * 5 + 2;
            this.speedX = (Math.random() - 0.5) * 0.8;
            this.speedY = (Math.random() - 0.5) * 0.8;
            this.color = 'rgba(0, 0, 0,';
            this.alpha = 0.2;
            this.decay = Math.random() * 0.015 + 0.01;
        }
        update() { this.x += this.speedX; this.y += this.speedY; if (this.size > 0.2) this.size -= 0.05; this.alpha -= this.decay; }
        draw() { ctx.fillStyle = this.color + this.alpha + ')'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
    }
    window.addEventListener('mousemove', (e) => { particles.push(new Particle(e.clientX, e.clientY)); });
    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < particles.length; i++) {
            particles[i].update(); particles[i].draw();
            if (particles[i].alpha <= 0) { particles.splice(i, 1); i--; }
        }
        requestAnimationFrame(animate);
    }
    animate();
</script>

</body>
</html>
